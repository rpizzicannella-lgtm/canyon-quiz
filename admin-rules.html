i condizione</button></div></div><div id="rulePayloadBox" class="item"></div><div class="small-actions"><button type="button" id="newRuleBtn">Nuova</button><button type="button" id="saveRuleBtn" class="primary">Salva</button><button type="button" id="duplicateRuleBtn">Duplica</button><button type="button" id="deleteRuleBtn">Elimina</button><button type="button" id="toggleRuleBtn">Attiva/Disattiva</button></div></form></div></div></section><section class="card"><div class="section-title">Messaggi</div><div id="result">Nessuna azione ancora.</div></section></div></div><script src="./js/config.js"></script><script src="./js/default-config.js"></script><script src="./js/storage.js"></script><script src="./js/auth.js"></script><script src="./js/supabase-adapter.js"></script><script src="./js/engine.js"></script><script src="./js/admin-common.js"></script><script src="./js/admin-rules.js"></script></body></html>
