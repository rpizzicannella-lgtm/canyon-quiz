<!DOCTYPE html><html lang="it"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Gestione regole audit</title><link rel="manifest" href="./manifest.json"><link rel="stylesheet" href="./styles.css"><meta name="theme-color" content="#0f172a"></head><body><div class="app"><div id="pinGate" class="card"><div class="section-title">Accesso Admin</div><p>Inserisci il PIN per accedere all’area amministrativa.</p><div class="grid2"><input id="pinInput" type="password" placeholder="PIN admin" class="text-input"><button id="pinBtn" type="button" class="primary">Entra</button></div><div id="pinMsg"></div></div><div id="adminApp" class="hidden"><header class="topbar"><h1>Gestione regole audit</h1><div class="status-row"><span class="badge">Versione v36.7.0</span><span class="badge">Audit amministrabile</span><span class="badge accent" id="archiveCount">Scenari: --</span></div></header><section class="controls card"><div class="grid2"><a class="button-link primary-link" href="./admin.html">Dashboard Admin</a><a class="button-link" href="./admin-audit.html">Vai ad Audit incoerenze</a></div></section><section class="card"><div class="section-title">Regole audit</div><div class="grid2"><div><div id="auditRulesList" class="listbox"></div></div><div><form id="auditRuleForm" class="listbox"><label class="stacked">ID<input id="auditRuleId" class="text-input"></label><label class="stacked">Nome<input id="auditRuleName" class="text-input"></label><label class="stacked">Gravità<select id="auditRuleSeverity"><option value="BASSA">Bassa</option><option value="MEDIA">Media</option><option value="ALTA">Alta</option></select></label><label><input id="auditRuleEnabled" type="checkbox"> Regola attiva</label><div class="item"><strong>Condizioni scenario</strong><div id="auditConditionsList" class="listbox"></div><div class="small-actions"><button type="button" id="addAuditConditionBtn">Aggiungi condizione</button></div></div><div class="item">
